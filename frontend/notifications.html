<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FantasyArena — Notifications</title>
  <link rel="stylesheet" href="css/styles.css?v=4" />
</head>
<body>
<div class="page">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <h2>Notifications</h2>
      <button class="btn btn-secondary btn-sm" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="card">
      <div id="notif-list">
        <div class="empty-state"><p>Loading…</p></div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js?v=4"></script>
<script src="js/toast.js?v=4"></script>
<script src="js/nav.js?v=4"></script>
<script>
  buildNav("notifications");

  const iconMap = {
    contest_joined: "🏆", score_update: "⚡", leaderboard_update: "📊",
    prize_awarded: "💰", match_started: "🏏", match_completed: "✅",
    wallet: "💳", system: "🔔",
  };

  async function loadNotifications() {
    try {
      const notifs = await api.get("/notifications");
      const el = document.getElementById("notif-list");
      if (!notifs.length) { el.innerHTML = '<div class="empty-state"><p>No notifications yet.</p></div>'; return; }
      el.innerHTML = notifs.map(n => `
        <div style="display:flex;gap:1rem;padding:1rem;border-bottom:1px solid var(--border);${!n.is_read ? 'background:rgba(0,212,255,0.03)' : ''}"
             id="notif-${n.id}">
          <div style="font-size:1.4rem;flex-shrink:0">${iconMap[n.type] || "🔔"}</div>
          <div style="flex:1">
            <div style="font-weight:600;${!n.is_read ? 'color:var(--text-primary)' : 'color:var(--text-secondary)'}">${n.title}</div>
            <div style="font-size:0.875rem;color:var(--text-secondary);margin-top:0.2rem">${n.message}</div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.4rem">${new Date(n.created_at).toLocaleString()}</div>
          </div>
          ${!n.is_read ? `<button class="btn btn-secondary btn-sm" onclick="markRead(${n.id})">Mark read</button>` : '<span style="color:var(--text-muted);font-size:0.75rem">read</span>'}
        </div>`).join("");
    } catch (e) { showToast(e.message, "error"); }
  }

  async function markRead(id) {
    try {
      await api.patch(`/notifications/${id}/read`, {});
      document.getElementById(`notif-${id}`)?.remove();
    } catch (_) {}
  }

  async function markAllRead() {
    try {
      await api.patch("/notifications/read-all", {});
      showToast("All marked as read", "success");
      loadNotifications();
    } catch (_) {}
  }

  loadNotifications();
</script>
</body>
</html>
